version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17

  build:
    commands:
      - echo "Backend PR check: compile + test"
      - mvn -f backend/pom.xml test --no-transfer-progress
      - echo "All backend tests passed"

reports:
  BackendTestReport:
    files:
      - '**/surefire-reports/TEST-*.xml'
    base-directory: backend/target
    file-format: JUNITXML
    discard-expired-reports: false
