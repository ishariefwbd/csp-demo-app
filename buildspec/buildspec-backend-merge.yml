version: 0.2
# Merge build: runs on push to main via csp-dev-pipeline.
# Builds the Docker image, pushes to ECR, and exports IMAGE_TAG for downstream
# pipeline stages via the BackendBuild namespace.

env:
  exported-variables:
    - IMAGE_TAG

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo "=== Computing IMAGE_TAG ==="
      - POM_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout -f pom.xml)
      - COMMIT_SHORT=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c1-7)
      - export IMAGE_TAG="${POM_VERSION}-${COMMIT_SHORT}"
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - echo "=== Logging in to ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI

  build:
    commands:
      - |
        ECR_REPO_NAME=$(echo "$ECR_REPO_URI" | sed 's|.*/||')
        if aws ecr describe-images --repository-name "$ECR_REPO_NAME" --image-ids imageTag="$IMAGE_TAG" --region $AWS_DEFAULT_REGION > /dev/null 2>&1; then
          echo "Image $IMAGE_TAG already exists in ECR - skipping build and push"
          SKIP_BUILD=true
        else
          SKIP_BUILD=false
        fi
      - |
        if [ "$SKIP_BUILD" = "false" ]; then
          echo "=== Building backend JAR ==="
          mvn -f backend/pom.xml package -DskipTests --no-transfer-progress
          echo "=== Building Docker image ==="
          docker build -t $ECR_REPO_URI:$IMAGE_TAG -f Dockerfile .
          echo "=== Pushing to ECR ==="
          docker push $ECR_REPO_URI:$IMAGE_TAG
          echo "Pushed $ECR_REPO_URI:$IMAGE_TAG"
        fi

  post_build:
    commands:
      - printf '[{"name":"wbd-csp-ms","imageUri":"%s"}]' "$ECR_REPO_URI:$IMAGE_TAG" > imagedefinitions.json
      - cat imagedefinitions.json
      - echo "=== Emitting Artifact Built notification event ==="
      - |
        if [ -n "$EVENT_BUS" ]; then
          printf '[{"Source":"csp.cicd","DetailType":"Artifact Built","EventBusName":"%s","Detail":"{\\"imageTag\\":\\"%s\\",\\"commitSha\\":\\"%s\\",\\"ecrImageUri\\":\\"%s\\",\\"initiator\\":\\"csp-dev-pipeline\\"}"}]' \
            "$EVENT_BUS" "$IMAGE_TAG" "$COMMIT_SHORT" "$ECR_REPO_URI:$IMAGE_TAG" > /tmp/artifact-event.json
          aws events put-events --entries file:///tmp/artifact-event.json --region "$AWS_DEFAULT_REGION" \
            && echo "Artifact Built event emitted for $IMAGE_TAG" \
            || echo "put-events failed (non-fatal - notification only)"
        else
          echo "EVENT_BUS not set - skipping notification"
        fi

artifacts:
  files:
    - imagedefinitions.json
  discard-paths: yes
