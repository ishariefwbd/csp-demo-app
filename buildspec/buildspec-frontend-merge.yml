version: 0.2
# Merge build: runs in parallel with the backend merge build inside csp-dev-pipeline.
# Builds the Angular app in production mode and uploads the bundle to S3 under:
#   s3://<ARTIFACT_BUCKET>/builds/<IMAGE_TAG>/
# The same bundle is used for all environments (env-specific config via runtime env vars).

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd frontend && npm ci --prefer-offline

  pre_build:
    commands:
      - echo "=== Computing IMAGE_TAG from parent POM ==="
      - POM_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>/\1/' | tr -d '[:space:]')
      - export IMAGE_TAG="${POM_VERSION}-${CODEBUILD_RESOLVED_SOURCE_VERSION:0:7}"
      - echo "IMAGE_TAG=$IMAGE_TAG"

  build:
    commands:
      - echo "=== Building Angular app (production) ==="
      - cd frontend && npx ng build --configuration=production --no-progress
      - echo "✓ Angular build complete"
      - ls -lh dist/csp-demo-frontend/browser/ | head -20

  post_build:
    commands:
      - echo "=== Uploading frontend bundle to S3 ==="
      - |
        for env in dev qa stage prod; do
          echo "  Uploading to s3://$ARTIFACT_BUCKET/builds/$IMAGE_TAG/$env/"
          aws s3 sync frontend/dist/csp-demo-frontend/browser/ \
            "s3://$ARTIFACT_BUCKET/builds/$IMAGE_TAG/$env/" \
            --quiet
        done
      - echo "✓ Frontend artifacts uploaded for IMAGE_TAG $IMAGE_TAG"
      - echo "  Location: s3://$ARTIFACT_BUCKET/builds/$IMAGE_TAG/"
