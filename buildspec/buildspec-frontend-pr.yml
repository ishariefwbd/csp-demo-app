version: 0.2
# Runs on every PR targeting main. Installs dependencies and runs a
# development build to catch TypeScript/template errors quickly.

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm --prefix frontend install --prefer-offline

  build:
    commands:
      - echo "=== Frontend PR check - development build ==="
      - cd frontend && npx ng build --configuration=development --no-progress
      - echo "Frontend build passed"
